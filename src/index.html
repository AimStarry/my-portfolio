<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Aimee Pangan | Portfolio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .app-loading {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      display: flex; justify-content: center; align-items: center;
      background-color: #06221A; z-index: 9999; font-family: 'Lexend', sans-serif;
      transition: opacity 0.6s ease-in-out;
    }
    .loader-content { text-align: center; display: flex; flex-direction: column; align-items: center; }
    .loader-logo { width: 80px; margin-bottom: 25px; animation: pulse 2s infinite ease-in-out; }
    .progress-wrapper { width: 160px; }
    .loading-bar { width: 100%; height: 2px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; width: 0%; background: #E67E22; transition: width 0.3s ease; }
    .percentage { color: rgba(245, 245, 245, 0.5); font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
  </style>
</head>
<body>
  <app-root>
    <div class="app-loading" id="main-loader">
      <div class="loader-content">
        <img src="assets/logo.png" alt="Logo" class="loader-logo">
        <div class="progress-wrapper">
          <div class="loading-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="percentage" id="load-percentage">0%</div>
        </div>
      </div>
    </div>
    <script>
      (function() {
        let p = 0;
        const f = document.getElementById('progress-fill');
        const t = document.getElementById('load-percentage');
        const i = setInterval(() => {
          p += Math.floor(Math.random() * 15) + 5;
          if (p >= 100) { p = 100; clearInterval(i); }
          if (f) f.style.width = p + '%';
          if (t) t.textContent = p + '%';
        }, 150);
      })();
    </script>
  </app-root>
</body>
</html>
